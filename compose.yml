services:
  nextapp:
    container_name: nextapp
    image: nextapp:1.0.0
    build:
      context: ./frontend
      dockerfile: next.dockerfile
    ports:
      - 3000:3000
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - flaskapp

  flaskapp:
    container_name: flaskapp
    image: flaskapp:1.0.0
    build:
      context: ./backend
      dockerfile: flask.dockerfile
    ports:
      - 4000:4000
    volumes:
      - ./backend/InputData:/app/InputData
      - "./backend/Geospatial Data:/app/Geospatial Data"
      - "./backend/Tech Designs:/app/Tech Designs"
      - "./backend/Resource Data:/app/Resource Data"
      - "./backend/Tech Outputs:/app/Tech Outputs"
      - ./backend/Portfolios:/app/Portfolios
      # Gurobi B&B node files — spilled to disk to prevent OOM
      - ./gurobi_nodefiles:/app/gurobi_nodefiles
      # Place your gurobi.lic file in the project root (same folder as compose.yml)
      - ./gurobi.lic:/root/gurobi.lic
      # ALTERNATIVE: Mount East Coast Model data directly (adjust path for your machine)
      # Uncomment the line below and comment out the Tech Outputs line above:
      # - "D:/Rob M/East Coast Model/Tech Outputs:/app/Tech Outputs"
    environment:
      - GRB_LICENSE_FILE=/root/gurobi.lic
